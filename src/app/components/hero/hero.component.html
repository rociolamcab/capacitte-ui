<section class="hero-section bg-primary text-white py-5 mb-4">
  <div class="container py-4">
    <div class="row align-items-center">
      <div class="col-lg-8 mx-auto text-center">
        <h1 class="display-4 fw-bold mb-3">Encuentra tu próximo paso en Capacitte</h1>
        <p class="lead mb-4 opacity-75">Explora cientos de oportunidades laborales diseñadas para tu crecimiento profesional.</p>
        
        <div class="search-box bg-white p-2 rounded-pill shadow-lg d-flex align-items-center">
          <i class="bi bi-search text-muted ms-3"></i>
          <input 
            type="text" 
            class="form-control border-0 shadow-none ps-3" 
            placeholder="Puesto, empresa o palabra clave..."
            (input)="onSearchChange($event)">
          <button class="btn btn-dark rounded-pill px-4 py-2 ms-2">Buscar</button>
        </div>
      </div>
    </div>
  </div>
</section>
