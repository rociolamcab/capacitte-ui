<app-hero (search)="onSearch($event)"></app-hero>

<div class="container my-5">
  <div class="row">
    
    <aside class="col-lg-3 mb-4">
      <div class="card border-0 shadow-sm p-4 sticky-top">
        <h5 class="fw-bold mb-4">Filtros</h5>
        
        <div class="mb-4">
          <label class="small fw-bold text-uppercase text-muted mb-2 d-block">Modalidad</label>
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="remote" (change)="onFilterChange()">
            <label class="form-check-label" for="remote">Remoto</label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="presencial" (change)="onFilterChange()">
            <label class="form-check-label" for="presencial">Presencial</label>
          </div>
        </div>
        
        <div class="mb-4">
          <label class="small fw-bold text-uppercase text-muted mb-2 d-block">Jornada</label>
          <select class="form-select bg-light border-0" (change)="onFilterChange()">
            <option value="all" selected>Cualquiera</option>
            <option value="full">Jornada Completa</option>
            <option value="part">Media Jornada</option>
          </select>
        </div>
        
        <button (click)="clearFilters()" class="btn btn-outline-primary w-100 rounded-pill btn-sm">
          Limpiar filtros
        </button>
      </div>
    </aside>
    
    <main class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <p class="text-muted mb-0">
          Resultados: <span class="fw-bold text-dark">{{ filteredJobs.length }}</span>
        </p>
        <div class="d-flex align-items-center">
          <span class="small text-muted me-2 d-none d-sm-inline">Ordenar por:</span>
          <select class="form-select form-select-sm border-0 shadow-sm w-auto">
            <option>Recientes</option>
            <option>Sueldo</option>
          </select>
        </div>
      </div>
      
      <div class="row g-4">
        @for (item of filteredJobs; track item.id) {
          <div class="col-12 col-md-6">
            <app-job-card [jobData]="item"></app-job-card>
          </div>
        } @empty {
          <div class="col-12">
            <div class="bg-white text-center py-5 shadow-sm rounded">
              <i class="bi bi-search text-muted display-4"></i>
              <p class="text-muted mt-3">No hay vacantes que coincidan con tu búsqueda.</p>
            </div>
          </div>
        }
      </div>
    </main>
    
  </div>
</div>
